<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>电士多充电站运营日报看板</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:#f0f2f5;color:#1a1a1a}

.app{display:flex;height:100vh}

/* ========== 桌面端侧边栏 ========== */
.sidebar{width:280px;min-width:280px;background:#fff;border-right:1px solid #e5e7eb;display:flex;flex-direction:column;overflow:hidden;transition:width .2s}
.sidebar-header{background:linear-gradient(135deg,#1a56db 0%,#3b82f6 100%);color:#fff;padding:16px 16px 14px;flex-shrink:0;position:relative}
.sidebar-header .logo{font-size:17px;font-weight:700;margin-bottom:1px}
.sidebar-header .sub{font-size:11px;opacity:.8}
.sidebar-header .count{font-size:10px;opacity:.65;margin-top:4px}
.sidebar-header .close-btn{display:none;position:absolute;right:14px;top:50%;transform:translateY(-50%);width:30px;height:30px;border-radius:50%;border:1px solid rgba(255,255,255,.35);background:transparent;color:#fff;font-size:16px;cursor:pointer;align-items:center;justify-content:center}

.search-box{padding:10px 14px;border-bottom:1px solid #f0f0f0;flex-shrink:0}
.search-box input{width:100%;padding:7px 10px;border:1px solid #e5e7eb;border-radius:6px;font-size:13px;outline:none;background:#f9fafb;transition:border-color .2s}
.search-box input:focus{border-color:#3b82f6;background:#fff}

.date-list{flex:1;overflow-y:auto;padding:6px 0}
.date-list::-webkit-scrollbar{width:4px}
.date-list::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:10px}
.date-item{display:flex;align-items:center;gap:12px;padding:9px 16px;cursor:pointer;transition:background .12s;border-left:3px solid transparent;user-select:none;-webkit-tap-highlight-color:transparent}
.date-item:hover{background:#f3f4f6}
.date-item.active{background:#eff6ff;border-left-color:#3b82f6}
.date-item .dot{width:6px;height:6px;border-radius:50%;background:#d1d5db;flex-shrink:0}
.date-item.active .dot{background:#3b82f6}
.date-item .date-info{display:flex;flex-direction:column;min-width:0}
.date-item .date-str{font-size:13px;font-weight:500;color:#374151}
.date-item .weekday{font-size:10px;color:#9ca3af;margin-top:1px}
.date-item.active .date-str{color:#1a56db}
.date-item .badge-today{font-size:9px;background:#dbeafe;color:#1a56db;padding:2px 7px;border-radius:8px;font-weight:600;margin-left:auto;flex-shrink:0}
.no-results{padding:40px 20px;text-align:center;color:#9ca3af;font-size:13px}

/* ========== 右侧主区域 ========== */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

/* 桌面端头部 */
.main-header{background:#fff;padding:10px 20px;border-bottom:1px solid #e5e7eb;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;height:50px}
.main-header .title{font-size:14px;font-weight:600;color:#374151;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.main-header .actions{display:flex;gap:6px;flex-shrink:0}
.main-header .btn{padding:5px 12px;border:1px solid #e5e7eb;border-radius:6px;background:#fff;font-size:12px;cursor:pointer;color:#555;transition:all .12s;white-space:nowrap}
.main-header .btn:hover{background:#f3f4f6;border-color:#d1d5db}
.main-header .btn:disabled{opacity:.35;cursor:not-allowed}
.main-header .btn-prev::before{content:'\2190 '}
.main-header .btn-next::after{content:' \2192'}
.main-header .menu-btn{display:none}

/* iframe容器 */
.iframe-container{flex:1;position:relative;overflow:hidden;-webkit-overflow-scrolling:touch}
.iframe-container iframe{width:100%;height:100%;border:none;display:block}
.iframe-container .placeholder{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#9ca3af}
.iframe-container .placeholder .msg{font-size:15px}
.iframe-container .placeholder .hint{font-size:12px;margin-top:6px;color:#bbb}

.loading-bar{position:absolute;top:0;left:0;right:0;height:3px;background:#1a56db;animation:loading 1.2s ease-in-out infinite;display:none;z-index:5}
.loading-bar.show{display:block}
@keyframes loading{0%{transform:translateX(-100%)}50%{transform:translateX(0)}100%{transform:translateX(100%)}}

.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:19}

/* ============================================
   移动端 / 平板端 (<=1024px)
   ============================================ */
@media (max-width:1024px){
  .app{position:relative}

  /* 侧边栏 → 全屏抽屉 */
  .sidebar{position:fixed;top:0;left:0;width:100%;max-width:100%;min-width:auto;height:100%;z-index:30;transform:translateX(-100%);transition:transform .25s ease;box-shadow:4px 0 20px rgba(0,0,0,.2)}
  .sidebar.show{transform:translateX(0)}
  .sidebar-header{padding:20px 18px 18px}
  .sidebar-header .logo{font-size:20px}
  .sidebar-header .sub{font-size:13px}
  .sidebar-header .count{font-size:11px}
  .sidebar-header .close-btn{display:flex}
  .date-item{padding:12px 18px}
  .date-item .date-str{font-size:15px}
  .date-item .weekday{font-size:11px}

  .overlay.show{display:block}

  /* 移动端头部 → 极简 */
  .main-header{padding:0 10px;height:42px;background:#fff;border-bottom:1px solid #e5e7eb;gap:0}
  .main-header .menu-btn{display:flex;width:36px;height:36px;padding:0;border:none;background:transparent;font-size:20px;cursor:pointer;flex-shrink:0;align-items:center;justify-content:center;color:#555}
  .main-header .title{font-size:13px;font-weight:600;color:#374151;cursor:pointer;padding:0 6px;line-height:42px}
  .main-header .title:active{color:#1a56db}
  .main-header .actions{gap:2px}
  .main-header .btn{padding:5px 10px;border:1px solid #e5e7eb;border-radius:5px;font-size:11px;min-width:36px;text-align:center}
  .main-header .btn-prev::before{content:'\2190';margin-right:0}
  .main-header .btn-next::after{content:'\2192';margin-left:0}
}
</style>
</head>
<body>

<div class="overlay" id="overlay" onclick="hideSidebar()"></div>

<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo">电士多</div>
      <div class="sub">充电站运营日报看板</div>
      <div class="count" id="report-count">加载中...</div>
      <button class="close-btn" onclick="hideSidebar()">&#10005;</button>
    </div>
    <div class="search-box">
      <input type="text" id="search-input" placeholder="搜索日期..." oninput="filterDates()">
    </div>
    <div class="date-list" id="date-list">
      <div class="no-results">加载中...</div>
    </div>
  </aside>

  <main class="main">
    <div class="main-header">
      <button class="btn menu-btn" id="menu-btn" onclick="showSidebar()">&#9776;</button>
      <div class="title" id="current-title">加载中...</div>
      <div class="actions">
        <button class="btn btn-prev" id="btn-prev" onclick="navDate(-1)"></button>
        <button class="btn btn-next" id="btn-next" onclick="navDate(1)"></button>
      </div>
    </div>
    <div class="iframe-container">
      <div class="loading-bar" id="loading-bar"></div>
      <div class="placeholder" id="placeholder">
        <div class="msg">点击左上角菜单选择日期</div>
        <div class="hint">加载中...</div>
      </div>
      <iframe id="report-frame" style="display:none" onload="onFrameLoad()"></iframe>
    </div>
  </main>
</div>

<script>
var reports = [];
var currentIndex = -1;
var isMobile = window.innerWidth <= 1024;

function updateLayout() {
  isMobile = window.innerWidth <= 1024;
  if (!isMobile) {
    document.getElementById('sidebar').classList.remove('show');
    document.getElementById('overlay').classList.remove('show');
  }
}

window.addEventListener('resize', updateLayout);
window.addEventListener('orientationchange', function() {
  setTimeout(updateLayout, 200);
});

function showSidebar() {
  document.getElementById('sidebar').classList.add('show');
  document.getElementById('overlay').classList.add('show');
  setTimeout(function() {
    var inp = document.getElementById('search-input');
    if (inp) inp.focus();
  }, 300);
}

function hideSidebar() {
  document.getElementById('sidebar').classList.remove('show');
  document.getElementById('overlay').classList.remove('show');
}

async function init() {
  try {
    var resp = await fetch('data.json?' + Date.now());
    if (!resp.ok) throw new Error('load failed');
    var data = await resp.json();
    reports = data.reports || [];
  } catch (e) {
    reports = [];
  }

  document.getElementById('report-count').textContent = '共 ' + reports.length + ' 份日报';
  renderDateList();

  if (reports.length > 0) {
    selectDate(0);
  }
}

function renderDateList(filter) {
  var list = document.getElementById('date-list');
  var today = new Date();
  var todayStr = formatDate(today);
  var filtered = reports;

  if (filter) {
    var f = filter.toLowerCase();
    filtered = reports.filter(function(r) {
      return r.date.indexOf(f) !== -1 || r.weekday.indexOf(f) !== -1;
    });
  }

  if (filtered.length === 0) {
    list.innerHTML = '<div class="no-results">没有匹配的日期</div>';
    return;
  }

  list.innerHTML = filtered.map(function(r) {
    var origIndex = reports.indexOf(r);
    var isToday = r.date === todayStr;
    var activeClass = (origIndex === currentIndex) ? ' active' : '';
    return '<div class="date-item' + activeClass + '" onclick="onDateClick(' + origIndex + ')">' +
      '<span class="dot"></span>' +
      '<div class="date-info">' +
        '<span class="date-str">' + r.date + '</span>' +
        '<span class="weekday">星期' + r.weekday + '</span>' +
      '</div>' +
      (isToday ? '<span class="badge-today">今天</span>' : '') +
    '</div>';
  }).join('');
}

function onDateClick(index) {
  selectDate(index);
  if (isMobile) hideSidebar();
}

function filterDates() {
  renderDateList(document.getElementById('search-input').value.trim());
}

function selectDate(index) {
  if (index < 0 || index >= reports.length) return;
  currentIndex = index;
  var r = reports[index];

  document.getElementById('current-title').textContent = r.date + ' 运营日报';
  renderDateList(document.getElementById('search-input').value.trim());

  var prevBtn = document.getElementById('btn-prev');
  var nextBtn = document.getElementById('btn-next');
  prevBtn.disabled = (index >= reports.length - 1);
  nextBtn.disabled = (index <= 0);

  loadReport(r.file);
}

function loadReport(file) {
  var frame = document.getElementById('report-frame');
  var placeholder = document.getElementById('placeholder');
  var loadingBar = document.getElementById('loading-bar');

  placeholder.style.display = 'none';
  frame.style.display = 'none';
  loadingBar.classList.add('show');
  frame.src = 'reports/' + file;
}

function onFrameLoad() {
  document.getElementById('loading-bar').classList.remove('show');
  document.getElementById('report-frame').style.display = 'block';
  // 手机端：给日报表格加上横向滚动
  try {
    var doc = document.getElementById('report-frame').contentDocument;
    var s = doc.createElement('style');
    s.textContent = '.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}table{min-width:520px}';
    doc.head.appendChild(s);
  } catch(e) {}
}

function navDate(direction) {
  var newIndex = currentIndex + direction;
  if (newIndex >= 0 && newIndex < reports.length) {
    selectDate(newIndex);
  }
}

document.addEventListener('keydown', function(e) {
  if (document.activeElement.tagName === 'INPUT') return;
  if (e.key === 'ArrowUp') { e.preventDefault(); navDate(-1); }
  if (e.key === 'ArrowDown') { e.preventDefault(); navDate(1); }
});

document.getElementById('current-title').addEventListener('click', function() {
  if (isMobile && currentIndex >= 0) showSidebar();
});

function formatDate(d) {
  var y = d.getFullYear();
  var m = String(d.getMonth() + 1);
  var day = String(d.getDate());
  if (m.length < 2) m = '0' + m;
  if (day.length < 2) day = '0' + day;
  return y + '-' + m + '-' + day;
}

init();
</script>
</body>
</html>
