<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>电士多充电站运营日报看板</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:#f0f2f5;color:#1a1a1a}

/* 整体布局 */
.app{display:flex;height:100vh}

/* 左侧边栏 */
.sidebar{width:300px;min-width:300px;background:#fff;border-right:1px solid #e5e7eb;display:flex;flex-direction:column;overflow:hidden}
.sidebar-header{background:linear-gradient(135deg,#1a56db 0%,#3b82f6 100%);color:#fff;padding:20px 20px 16px;flex-shrink:0}
.sidebar-header .logo{font-size:18px;font-weight:700;margin-bottom:2px}
.sidebar-header .sub{font-size:12px;opacity:.8}
.sidebar-header .count{font-size:11px;opacity:.7;margin-top:6px}

/* 搜索框 */
.search-box{padding:12px 16px;border-bottom:1px solid #f0f0f0;flex-shrink:0}
.search-box input{width:100%;padding:8px 12px;border:1px solid #e5e7eb;border-radius:8px;font-size:13px;outline:none;background:#f9fafb;transition:border-color .2s}
.search-box input:focus{border-color:#3b82f6;background:#fff}

/* 日期列表 */
.date-list{flex:1;overflow-y:auto;padding:8px 0}
.date-list::-webkit-scrollbar{width:5px}
.date-list::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:10px}
.date-item{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;cursor:pointer;transition:background .15s;border-left:3px solid transparent;user-select:none}
.date-item:hover{background:#f3f4f6}
.date-item.active{background:#eff6ff;border-left-color:#3b82f6}
.date-item .date-info{display:flex;flex-direction:column}
.date-item .date-str{font-size:14px;font-weight:500;color:#374151}
.date-item .weekday{font-size:11px;color:#9ca3af;margin-top:1px}
.date-item .badge-today{font-size:10px;background:#dbeafe;color:#1a56db;padding:2px 8px;border-radius:10px;font-weight:600}
.date-item.active .date-str{color:#1a56db}
.no-results{padding:40px 20px;text-align:center;color:#9ca3af;font-size:13px}

/* 右侧主区域 */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.main-header{background:#fff;padding:12px 24px;border-bottom:1px solid #e5e7eb;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.main-header .title{font-size:15px;font-weight:600;color:#374151}
.main-header .actions{display:flex;gap:8px}
.main-header .btn{padding:6px 14px;border:1px solid #e5e7eb;border-radius:6px;background:#fff;font-size:12px;cursor:pointer;color:#555;transition:all .15s}
.main-header .btn:hover{background:#f3f4f6;border-color:#d1d5db}
.main-header .btn:disabled{opacity:.4;cursor:not-allowed}
.main-header .btn-prev::before{content:'< '}
.main-header .btn-next::after{content:' >'}

/* iframe容器 */
.iframe-container{flex:1;position:relative;overflow:hidden}
.iframe-container iframe{width:100%;height:100%;border:none;display:block}
.iframe-container .placeholder{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#9ca3af}
.iframe-container .placeholder .icon{font-size:48px;margin-bottom:16px;opacity:.5}
.iframe-container .placeholder .msg{font-size:15px}
.iframe-container .placeholder .hint{font-size:12px;margin-top:8px;color:#bbb}

/* 加载状态 */
.loading-bar{position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#1a56db,#3b82f6,#1a56db);background-size:200% 100%;animation:loading 1.5s ease-in-out infinite;display:none}
.loading-bar.show{display:block}
@keyframes loading{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* 响应式 - 移动端 */
@media (max-width:768px){
  .sidebar{width:100%;min-width:100%;position:absolute;z-index:10;height:100%;transform:translateX(0);transition:transform .3s}
  .sidebar.hidden{transform:translateX(-100%)}
  .main-header{padding:10px 16px}
  .main-header .menu-btn{display:inline-block!important}
}
.main-header .menu-btn{display:none;padding:6px 10px;border:1px solid #e5e7eb;border-radius:6px;background:#fff;font-size:13px;cursor:pointer}
</style>
</head>
<body>

<div class="app">
  <!-- 左侧边栏 -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo">⚡ 电士多</div>
      <div class="sub">充电站运营日报看板</div>
      <div class="count" id="report-count">加载中...</div>
    </div>
    <div class="search-box">
      <input type="text" id="search-input" placeholder="搜索日期，如 07-18..." oninput="filterDates()">
    </div>
    <div class="date-list" id="date-list">
      <div class="no-results">加载中...</div>
    </div>
  </aside>

  <!-- 右侧主区域 -->
  <main class="main">
    <div class="main-header">
      <button class="btn menu-btn" onclick="toggleSidebar()" id="menu-btn">☰</button>
      <div class="title" id="current-title">选择一份日报查看</div>
      <div class="actions">
        <button class="btn btn-prev" id="btn-prev" onclick="navDate(-1)">前一日</button>
        <button class="btn btn-next" id="btn-next" onclick="navDate(1)">后一日</button>
      </div>
    </div>
    <div class="iframe-container">
      <div class="loading-bar" id="loading-bar"></div>
      <div class="placeholder" id="placeholder">
        <div class="icon">📊</div>
        <div class="msg">从左侧选择日期查看运营日报</div>
        <div class="hint">支持键盘 ↑↓ 快速切换日期</div>
      </div>
      <iframe id="report-frame" style="display:none" onload="onFrameLoad()"></iframe>
    </div>
  </main>
</div>

<script>
// ===== 数据加载 =====
let reports = [];
let currentIndex = -1;

async function init() {
  try {
    const resp = await fetch('data.json?' + Date.now());
    if (!resp.ok) throw new Error('data.json 加载失败');
    const data = await resp.json();
    reports = data.reports || [];
  } catch (e) {
    console.error('加载 data.json 失败，尝试从 reports 目录扫描', e);
    reports = [];
  }
  
  document.getElementById('report-count').textContent = 
    `共 ${reports.length} 份日报`;
  
  renderDateList();
  
  // 自动选中最新日期（第一条）
  if (reports.length > 0) {
    selectDate(0);
  }
}

// ===== 渲染日期列表 =====
function renderDateList(filter) {
  const list = document.getElementById('date-list');
  const today = new Date();
  const todayStr = formatDate(today);
  
  let filtered = reports;
  if (filter) {
    const f = filter.toLowerCase();
    filtered = reports.filter(r => r.date.includes(f) || r.weekday.includes(f));
  }
  
  if (filtered.length === 0) {
    list.innerHTML = '<div class="no-results">没有匹配的日期</div>';
    return;
  }
  
  list.innerHTML = filtered.map((r, i) => {
    const origIndex = reports.indexOf(r);
    const isToday = r.date === todayStr;
    const activeClass = (origIndex === currentIndex) ? ' active' : '';
    return `
      <div class="date-item${activeClass}" data-index="${origIndex}" onclick="selectDate(${origIndex})">
        <div class="date-info">
          <span class="date-str">${r.date}</span>
          <span class="weekday">星期${r.weekday}</span>
        </div>
        ${isToday ? '<span class="badge-today">今天</span>' : ''}
      </div>
    `;
  }).join('');
}

function filterDates() {
  const val = document.getElementById('search-input').value.trim();
  renderDateList(val);
}

// ===== 选择日期 =====
function selectDate(index) {
  if (index < 0 || index >= reports.length) return;
  
  currentIndex = index;
  const r = reports[index];
  
  // 更新标题
  document.getElementById('current-title').textContent = 
    `${r.date} 运营日报`;
  
  // 更新列表高亮
  renderDateList(document.getElementById('search-input').value.trim());
  
  // 更新按钮状态
  document.getElementById('btn-prev').disabled = (index >= reports.length - 1);
  document.getElementById('btn-next').disabled = (index <= 0);
  
  // 加载 iframe
  loadReport(r.file);
}

function loadReport(file) {
  const frame = document.getElementById('report-frame');
  const placeholder = document.getElementById('placeholder');
  const loadingBar = document.getElementById('loading-bar');
  
  placeholder.style.display = 'none';
  frame.style.display = 'none';
  loadingBar.classList.add('show');
  
  frame.src = 'reports/' + file;
}

function onFrameLoad() {
  document.getElementById('loading-bar').classList.remove('show');
  document.getElementById('report-frame').style.display = 'block';
}

// ===== 导航 =====
function navDate(direction) {
  // direction: 1 = 后一日（列表中上一条，因为最新在最上面）
  // direction: -1 = 前一日（列表中下一条）
  const newIndex = currentIndex + direction;
  if (newIndex >= 0 && newIndex < reports.length) {
    selectDate(newIndex);
  }
}

// ===== 键盘快捷键 =====
document.addEventListener('keydown', function(e) {
  // 不在搜索框中时响应
  if (document.activeElement.tagName === 'INPUT') return;
  
  if (e.key === 'ArrowUp') {
    e.preventDefault();
    navDate(-1); // 上键=前一天（列表中向下）
  } else if (e.key === 'ArrowDown') {
    e.preventDefault();
    navDate(1);  // 下键=后一天（列表中向上）
  }
});

// ===== 侧边栏切换（移动端） =====
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('hidden');
}

// ===== 工具函数 =====
function formatDate(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

// ===== 启动 =====
init();
</script>
</body>
</html>
