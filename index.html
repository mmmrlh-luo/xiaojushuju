<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>电士多充电站运营日报看板</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:#f0f2f5;color:#1a1a1a}

.app{display:flex;height:100vh}

/* 左侧边栏 */
.sidebar{width:300px;min-width:300px;background:#fff;border-right:1px solid #e5e7eb;display:flex;flex-direction:column;overflow:hidden}
.sidebar-header{background:linear-gradient(135deg,#1a56db 0%,#3b82f6 100%);color:#fff;padding:20px 20px 16px;flex-shrink:0;position:relative}
.sidebar-header .logo{font-size:18px;font-weight:700;margin-bottom:2px}
.sidebar-header .sub{font-size:12px;opacity:.8}
.sidebar-header .count{font-size:11px;opacity:.7;margin-top:6px}
.sidebar-header .close-btn{display:none;position:absolute;right:16px;top:50%;transform:translateY(-50%);width:32px;height:32px;border-radius:50%;border:1px solid rgba(255,255,255,.4);background:transparent;color:#fff;font-size:18px;cursor:pointer;align-items:center;justify-content:center}

.search-box{padding:12px 16px;border-bottom:1px solid #f0f0f0;flex-shrink:0}
.search-box input{width:100%;padding:8px 12px;border:1px solid #e5e7eb;border-radius:8px;font-size:13px;outline:none;background:#f9fafb;transition:border-color .2s}
.search-box input:focus{border-color:#3b82f6;background:#fff}

.date-list{flex:1;overflow-y:auto;padding:8px 0}
.date-list::-webkit-scrollbar{width:5px}
.date-list::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:10px}
.date-item{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;cursor:pointer;transition:background .15s;border-left:3px solid transparent;user-select:none}
.date-item:hover{background:#f3f4f6}
.date-item.active{background:#eff6ff;border-left-color:#3b82f6}
.date-item .date-info{display:flex;flex-direction:column}
.date-item .date-str{font-size:14px;font-weight:500;color:#374151}
.date-item .weekday{font-size:11px;color:#9ca3af;margin-top:1px}
.date-item .badge-today{font-size:10px;background:#dbeafe;color:#1a56db;padding:2px 8px;border-radius:10px;font-weight:600}
.date-item.active .date-str{color:#1a56db}
.no-results{padding:40px 20px;text-align:center;color:#9ca3af;font-size:13px}

/* 右侧主区域 */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.main-header{background:#fff;padding:12px 24px;border-bottom:1px solid #e5e7eb;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.main-header .title{font-size:15px;font-weight:600;color:#374151;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.main-header .title-link{cursor:default}
.main-header .actions{display:flex;gap:8px;flex-shrink:0}
.main-header .btn{padding:6px 14px;border:1px solid #e5e7eb;border-radius:6px;background:#fff;font-size:12px;cursor:pointer;color:#555;transition:all .15s}
.main-header .btn:hover{background:#f3f4f6;border-color:#d1d5db}
.main-header .btn:disabled{opacity:.4;cursor:not-allowed}
.main-header .btn-prev::before{content:'< '}
.main-header .btn-next::after{content:' >'}
.main-header .menu-btn{display:none;padding:6px 10px;border:1px solid #e5e7eb;border-radius:6px;background:#fff;font-size:16px;cursor:pointer;flex-shrink:0;margin-right:8px}

.iframe-container{flex:1;position:relative;overflow:hidden}
.iframe-container iframe{width:100%;height:100%;border:none;display:block}
.iframe-container .placeholder{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#9ca3af}
.iframe-container .placeholder .icon{font-size:48px;margin-bottom:16px;opacity:.5}
.iframe-container .placeholder .msg{font-size:15px}
.iframe-container .placeholder .hint{font-size:12px;margin-top:8px;color:#bbb}

.loading-bar{position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#1a56db,#3b82f6,#1a56db);background-size:200% 100%;animation:loading 1.5s ease-in-out infinite;display:none}
.loading-bar.show{display:block}
@keyframes loading{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* 移动端遮罩 */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:9}

/* 响应式 - 移动端 */
@media (max-width:768px){
  .sidebar{position:fixed;top:0;left:0;width:85%;max-width:320px;min-width:auto;height:100%;z-index:20;transform:translateX(-100%);transition:transform .25s ease;box-shadow:2px 0 12px rgba(0,0,0,.15)}
  .sidebar.show{transform:translateX(0)}
  .sidebar-header .close-btn{display:flex}
  .overlay.show{display:block}
  .main-header{padding:8px 12px}
  .main-header .menu-btn{display:inline-block}
  .main-header .title{font-size:14px}
  .main-header .title-link{cursor:pointer;text-decoration:none;color:#1a56db}
  .main-header .btn{padding:5px 10px;font-size:11px}
}
</style>
</head>
<body>

<div class="overlay" id="overlay" onclick="hideSidebar()"></div>

<div class="app">
  <!-- 左侧边栏 -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo">电士多</div>
      <div class="sub">充电站运营日报看板</div>
      <div class="count" id="report-count">加载中...</div>
      <button class="close-btn" onclick="hideSidebar()">✕</button>
    </div>
    <div class="search-box">
      <input type="text" id="search-input" placeholder="搜索日期，如 07-18..." oninput="filterDates()">
    </div>
    <div class="date-list" id="date-list">
      <div class="no-results">加载中...</div>
    </div>
  </aside>

  <!-- 右侧主区域 -->
  <main class="main">
    <div class="main-header">
      <button class="btn menu-btn" id="menu-btn" onclick="showSidebar()">&#9776;</button>
      <div class="title" id="current-title">选择一份日报查看</div>
      <div class="actions">
        <button class="btn btn-prev" id="btn-prev" onclick="navDate(-1)">前</button>
        <button class="btn btn-next" id="btn-next" onclick="navDate(1)">后</button>
      </div>
    </div>
    <div class="iframe-container">
      <div class="loading-bar" id="loading-bar"></div>
      <div class="placeholder" id="placeholder">
        <div class="icon" style="font-size:48px">&#128202;</div>
        <div class="msg">点击左上角菜单选择日期</div>
        <div class="hint">或点击标题栏快速切换</div>
      </div>
      <iframe id="report-frame" style="display:none" onload="onFrameLoad()"></iframe>
    </div>
  </main>
</div>

<script>
var reports = [];
var currentIndex = -1;
var isMobile = window.innerWidth <= 768;

window.addEventListener('resize', function() {
  isMobile = window.innerWidth <= 768;
  if (!isMobile) showSidebar();
  updateTitleStyle();
});

function updateTitleStyle() {
  var title = document.getElementById('current-title');
  if (isMobile && currentIndex >= 0) {
    title.className = 'title title-link';
    title.setAttribute('role', 'button');
  } else {
    title.className = 'title';
    title.removeAttribute('role');
  }
}

function showSidebar() {
  document.getElementById('sidebar').classList.add('show');
  document.getElementById('overlay').classList.add('show');
}

function hideSidebar() {
  document.getElementById('sidebar').classList.remove('show');
  document.getElementById('overlay').classList.remove('show');
}

async function init() {
  try {
    var resp = await fetch('data.json?' + Date.now());
    if (!resp.ok) throw new Error('data.json load failed');
    var data = await resp.json();
    reports = data.reports || [];
  } catch (e) {
    reports = [];
  }

  document.getElementById('report-count').textContent = '共 ' + reports.length + ' 份日报';
  renderDateList();

  if (reports.length > 0) {
    selectDate(0);
  }

  if (!isMobile) showSidebar();
  updateTitleStyle();
}

function renderDateList(filter) {
  var list = document.getElementById('date-list');
  var today = new Date();
  var todayStr = formatDate(today);
  var filtered = reports;

  if (filter) {
    var f = filter.toLowerCase();
    filtered = reports.filter(function(r) {
      return r.date.indexOf(f) !== -1 || r.weekday.indexOf(f) !== -1;
    });
  }

  if (filtered.length === 0) {
    list.innerHTML = '<div class="no-results">没有匹配的日期</div>';
    return;
  }

  list.innerHTML = filtered.map(function(r) {
    var origIndex = reports.indexOf(r);
    var isToday = r.date === todayStr;
    var activeClass = (origIndex === currentIndex) ? ' active' : '';
    return '<div class="date-item' + activeClass + '" data-index="' + origIndex + '" onclick="onDateClick(' + origIndex + ')">' +
      '<div class="date-info">' +
        '<span class="date-str">' + r.date + '</span>' +
        '<span class="weekday">星期' + r.weekday + '</span>' +
      '</div>' +
      (isToday ? '<span class="badge-today">今天</span>' : '') +
    '</div>';
  }).join('');
}

function onDateClick(index) {
  selectDate(index);
  if (isMobile) hideSidebar();
}

function filterDates() {
  renderDateList(document.getElementById('search-input').value.trim());
}

function selectDate(index) {
  if (index < 0 || index >= reports.length) return;

  currentIndex = index;
  var r = reports[index];

  document.getElementById('current-title').textContent = r.date + ' 运营日报';
  updateTitleStyle();

  renderDateList(document.getElementById('search-input').value.trim());

  document.getElementById('btn-prev').disabled = (index >= reports.length - 1);
  document.getElementById('btn-next').disabled = (index <= 0);

  loadReport(r.file);
}

function loadReport(file) {
  var frame = document.getElementById('report-frame');
  var placeholder = document.getElementById('placeholder');
  var loadingBar = document.getElementById('loading-bar');

  placeholder.style.display = 'none';
  frame.style.display = 'none';
  loadingBar.classList.add('show');

  frame.src = 'reports/' + file;
}

function onFrameLoad() {
  document.getElementById('loading-bar').classList.remove('show');
  document.getElementById('report-frame').style.display = 'block';
}

function navDate(direction) {
  var newIndex = currentIndex + direction;
  if (newIndex >= 0 && newIndex < reports.length) {
    selectDate(newIndex);
  }
}

document.addEventListener('keydown', function(e) {
  if (document.activeElement.tagName === 'INPUT') return;
  if (e.key === 'ArrowUp') { e.preventDefault(); navDate(-1); }
  if (e.key === 'ArrowDown') { e.preventDefault(); navDate(1); }
});

// 移动端：点击标题栏调出日期列表
document.getElementById('current-title').addEventListener('click', function() {
  if (isMobile && currentIndex >= 0) showSidebar();
});

function formatDate(d) {
  var y = d.getFullYear();
  var m = String(d.getMonth() + 1).padStart ? String(d.getMonth() + 1).padStart(2, '0') : ('0' + (d.getMonth() + 1)).slice(-2);
  var day = String(d.getDate()).padStart ? String(d.getDate()).padStart(2, '0') : ('0' + d.getDate()).slice(-2);
  return y + '-' + m + '-' + day;
}

// 兼容旧浏览器 padStart
if (!String.prototype.padStart) {
  String.prototype.padStart = function(len, pad) {
    var s = this;
    while (s.length < len) s = pad + s;
    return s;
  };
}

init();
</script>
</body>
</html>
